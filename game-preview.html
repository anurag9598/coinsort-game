<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Coin Sort Puzzle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,700;0,800;0,900;1,900&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:#a4b4c2}
#root{width:100%;height:100%;overflow-y:auto;overflow-x:hidden}

/* ── KEYFRAMES ── */
@keyframes rShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes floatBob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-11px)}}
@keyframes floatBobC{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes shimmer{from{background-position:-200% center}to{background-position:200% center}}
@keyframes coinIn{from{transform:scale(0) rotate(-180deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes sortPop{0%{transform:scale(1)}40%{transform:scale(1.10)}100%{transform:scale(1)}}
@keyframes floatUp{0%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-80px)}}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px) scale(0.85)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes lvlIn{from{transform:scale(0.6) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes winPop{from{transform:scale(0.5) translateY(36px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes pulseBg{0%,100%{box-shadow:0 8px 28px rgba(255,160,0,.5),0 0 0 3px rgba(255,200,0,.3)}50%{box-shadow:0 8px 44px rgba(255,160,0,.8),0 0 0 8px rgba(255,200,0,.42)}}
@keyframes burst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
@keyframes arrowBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}
@keyframes starPulse{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.55;transform:scale(1.5)}}
@keyframes gearSpin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes sortComplete{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
</style>
</head>
<body>
<div id="root"></div>

<script>
/* ════════════════════════════════════════════
   CONSTANTS
════════════════════════════════════════════ */
const CAP=4,SLOTS=10,MAX_LVL=7;
const LN=["NOVICE","APPRENTICE","JOURNEYMAN","EXPERT","VETERAN","MASTER","LEGEND"];
const LC=["#4e8ec8","#30a858","#c89000","#d05810","#c82020","#7018c0","#c01868"];
const LI=["🌱","⭐","🌟","💫","🔥","💎","👑"];
const P={
  1:{s:"#ffd0a0",a:"#d87030",b:"#a83818",c:"#601808",e:"#882210",g:"#ff8030",n:"Copper"},
  2:{s:"#f4faff",a:"#c8dce8",b:"#7898b0",c:"#365468",e:"#507080",g:"#80c0f0",n:"Silver"},
  3:{s:"#ffffa0",a:"#f0d020",b:"#c89008",c:"#805800",e:"#a07000",g:"#ffd020",n:"Gold"},
  4:{s:"#b0ff90",a:"#58d840",b:"#148810",c:"#094808",e:"#106810",g:"#38d010",n:"Jade"},
  5:{s:"#b0c8ff",a:"#6890f8",b:"#1048d8",c:"#0830a0",e:"#0840c0",g:"#3878ff",n:"Sapphire"},
  6:{s:"#e0b0ff",a:"#c068f8",b:"#7810d0",c:"#480890",e:"#6010b0",g:"#b040ff",n:"Amethyst"},
  7:{s:"#ffb0b0",a:"#f04848",b:"#c01010",c:"#780808",e:"#a00808",g:"#ff2020",n:"Ruby"},
  8:{s:"#ffb8cc",a:"#f06888",b:"#d01060",c:"#880030",e:"#b00840",g:"#ff4080",n:"Rose"},
};

/* ════════════════════════════════════════════
   GAME LOGIC
════════════════════════════════════════════ */
const shuf=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;};
const rackDone=r=>Array.isArray(r)&&r.length===CAP&&r.every(c=>c===r[0]);
const canDrop=(r,c)=>Array.isArray(r)&&r.length<CAP&&(r.length===0||r[r.length-1]===c);
function makeLevel(lvl){
  const nc=Math.min(lvl+1,8);
  const pool=shuf(Array.from({length:nc},(_,i)=>i+1).flatMap(d=>Array(CAP).fill(d)));
  const filled=Array.from({length:nc},(_,r)=>[...pool.slice(r*CAP,(r+1)*CAP)]);
  const active=[...filled,[],[]];
  return [...Array(SLOTS-active.length).fill(null),...active];
}

/* ════════════════════════════════════════════
   AUDIO ENGINE
════════════════════════════════════════════ */
let actx=null,mainGain=null,bgTimer=null,bgPlaying=false,bgIdx=0,muted=false;
function getActx(){
  if(!actx){actx=new(window.AudioContext||window.webkitAudioContext)();mainGain=actx.createGain();mainGain.gain.value=0.38;mainGain.connect(actx.destination);}
  if(actx.state==='suspended')actx.resume();
  return actx;
}
function tone(freq,dur,type='sine',vol=0.2,delay=0){
  if(muted)return;
  try{
    const a=getActx(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(mainGain);o.type=type;o.frequency.value=freq;
    const t=a.currentTime+delay;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t);o.stop(t+dur+0.02);
  }catch(e){}
}
const sfxPick=()=>{tone(880,0.07,'sine',0.16);tone(1320,0.05,'sine',0.09,0.02);};
const sfxDrop=()=>{tone(660,0.10,'sine',0.20);tone(990,0.07,'triangle',0.10,0.03);};
const sfxBad=()=>{tone(200,0.12,'sawtooth',0.14);tone(160,0.09,'sawtooth',0.10,0.06);};
const sfxDeal=()=>{[440,550,660].forEach((f,i)=>tone(f,0.13,'sine',0.18,i*0.07));};
const sfxSort=()=>{
  [523,659,784,1047].forEach((f,i)=>tone(f,0.28,'sine',0.26,i*0.09));
  setTimeout(()=>tone(2093,0.4,'sine',0.16),420);
};
const sfxLevel=()=>{
  [261,329,392,523,659,784,1047].forEach((f,i)=>tone(f,0.35,'triangle',0.26,i*0.10));
  setTimeout(()=>[523,659,784,1047,1319].forEach((f,i)=>tone(f,0.45,'sine',0.18,i*0.09)),1200);
};
function startBg(){
  if(bgPlaying)return;bgPlaying=true;playBar();
}
function stopBg(){bgPlaying=false;clearTimeout(bgTimer);}
function playBar(){
  if(!bgPlaying)return;
  const BPM=108,BEAT=60000/BPM;
  const bars=[
    {ch:[130.81,196,261.63],mel:[523.25,659.25,783.99,659.25]},
    {ch:[174.61,220,349.23],mel:[698.46,880,1046.5,880]},
    {ch:[196,246.94,392],  mel:[783.99,987.77,1174.66,987.77]},
    {ch:[130.81,164.81,196],mel:[659.25,783.99,1046.5,783.99]},
  ];
  const bar=bars[bgIdx%bars.length];bgIdx++;
  if(!muted){
    bar.ch.forEach(f=>{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(mainGain);o.type='triangle';o.frequency.value=f;const t=actx.currentTime;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.035,t+0.2);g.gain.setValueAtTime(0.035,t+(BEAT*4-200)/1000);g.gain.linearRampToValueAtTime(0,t+(BEAT*4)/1000);o.start(t);o.stop(t+BEAT*4/1000+0.1);});
    [0,2].forEach(b=>setTimeout(()=>{if(!muted)tone(bar.ch[0]/2,0.32,'triangle',0.12);},b*BEAT));
    bar.mel.forEach((f,i)=>setTimeout(()=>{if(!muted)tone(f,0.26,'sine',0.09);},i*BEAT));
  }
  bgTimer=setTimeout(()=>playBar(),BEAT*4);
}

/* ════════════════════════════════════════════
   CONFETTI
════════════════════════════════════════════ */
const CC=["#ff4040","#ff9900","#ffee00","#44ff44","#4488ff","#cc44ff","#ff44cc","#44ffee","#fff","#ff8844"];
let confCvs,confCtx,confPts=[],confRaf;
function initConfetti(){
  confCvs=document.createElement('canvas');
  confCvs.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:700';
  document.body.appendChild(confCvs);
  confCtx=confCvs.getContext('2d');
  const rsz=()=>{confCvs.width=innerWidth;confCvs.height=innerHeight;};
  rsz();window.addEventListener('resize',rsz);
  function tick(){
    confCtx.clearRect(0,0,confCvs.width,confCvs.height);
    confPts=confPts.filter(p=>p.l>0);
    confPts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.22;p.vx*=0.99;p.r+=p.rv;p.l-=p.d;
      confCtx.save();confCtx.globalAlpha=Math.max(0,p.l);
      confCtx.translate(p.x,p.y);confCtx.rotate(p.r*Math.PI/180);confCtx.fillStyle=p.c;
      if(p.s==='c'){confCtx.beginPath();confCtx.ellipse(0,0,p.w/2,p.h/2,0,0,Math.PI*2);confCtx.fill();}
      else confCtx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      confCtx.restore();
    });
    confRaf=requestAnimationFrame(tick);
  }
  confRaf=requestAnimationFrame(tick);
}
function launchConfetti(x,y,n=90){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=3+Math.random()*10;
    confPts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-Math.random()*5,c:CC[0|Math.random()*CC.length],w:5+Math.random()*10,h:4+Math.random()*7,r:Math.random()*360,rv:(Math.random()-.5)*15,l:1,d:0.012+Math.random()*0.012,s:Math.random()<.4?'c':'r'});
  }
}
function fullConfetti(){
  const W=innerWidth;
  for(let i=0;i<240;i++){
    confPts.push({x:Math.random()*W,y:-20-Math.random()*180,vx:(Math.random()-.5)*5,vy:4+Math.random()*9,c:CC[0|Math.random()*CC.length],w:6+Math.random()*11,h:4+Math.random()*7,r:Math.random()*360,rv:(Math.random()-.5)*16,l:1,d:0.005+Math.random()*0.006,s:Math.random()<.35?'c':'r'});
  }
}

/* ════════════════════════════════════════════
   SVG COIN RENDERER
════════════════════════════════════════════ */
function makeCoinSVG(d,size,glow=false){
  const c=P[d],R=size/2,id=`cd${d}s${size}`;
  const ticks=Array.from({length:36}).map((_,i)=>{
    const a=(i/36)*Math.PI*2,r1=R-5.5,r2=R-0.8;
    return `<line x1="${R+r1*Math.cos(a)}" y1="${R+r1*Math.sin(a)}" x2="${R+r2*Math.cos(a)}" y2="${R+r2*Math.sin(a)}" stroke="${i%2===0?'rgba(255,255,255,0.32)':'rgba(0,0,0,0.28)'}" stroke-width="1.1"/>`;
  }).join('');
  const glowDefs=glow?`<radialGradient id="gl${id}" cx="50%" cy="50%" r="50%"><stop offset="60%" stop-color="rgba(0,0,0,0)"/><stop offset="100%" stop-color="${c.g}66"/></radialGradient>`:'';
  const glowCircle=glow?`<circle cx="${R}" cy="${R}" r="${R+5}" fill="url(#gl${id})"/>`:'';
  const filt=glow?`filter="drop-shadow(0 0 ${R*.15|0}px ${c.g}) drop-shadow(0 0 ${R*.28|0}px ${c.g}88) drop-shadow(0 ${R*.06|0}px ${R*.14|0}px rgba(0,0,0,.52))"`:`filter="drop-shadow(0 ${R*.05|0}px ${R*.12|0}px rgba(0,0,0,.50))"`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" overflow="visible" ${filt}>
    <defs>
      ${glowDefs}
      <radialGradient id="mg${id}" cx="34%" cy="28%" r="72%">
        <stop offset="0%" stop-color="${c.s}"/><stop offset="18%" stop-color="${c.a}"/>
        <stop offset="52%" stop-color="${c.b}"/><stop offset="82%" stop-color="${c.c}"/>
        <stop offset="100%" stop-color="${c.e}"/>
      </radialGradient>
      <radialGradient id="sh${id}" cx="28%" cy="22%" r="52%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.74)"/>
        <stop offset="55%" stop-color="rgba(255,255,255,0.10)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
      </radialGradient>
      <linearGradient id="li${id}" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.30)"/>
        <stop offset="45%" stop-color="rgba(255,255,255,0)"/>
        <stop offset="100%" stop-color="rgba(0,0,0,0.22)"/>
      </linearGradient>
    </defs>
    ${glowCircle}
    <circle cx="${R}" cy="${R}" r="${R-.5}" fill="${c.e}" stroke="rgba(0,0,0,0.35)" stroke-width=".8"/>
    ${ticks}
    <circle cx="${R}" cy="${R}" r="${R-4.8}" fill="url(#mg${id})"/>
    <circle cx="${R}" cy="${R}" r="${R-4.8}" fill="url(#li${id})" opacity=".28"/>
    <circle cx="${R}" cy="${R}" r="${R-8}" fill="none" stroke="${c.s}" stroke-width=".7" opacity=".48"/>
    <circle cx="${R}" cy="${R}" r="${R*.33}" fill="rgba(0,0,0,0.54)"/>
    <circle cx="${R}" cy="${R}" r="${R*.33}" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width=".8"/>
    <text x="${R}" y="${R+1}" text-anchor="middle" dominant-baseline="middle" fill="white"
      font-size="${R*.46}" font-weight="900" font-family="Arial Black,Arial">${d}</text>
    <circle cx="${R}" cy="${R}" r="${R-4.8}" fill="url(#sh${id})"/>
    <path d="M${R-R*.58},${R-R*.58} A${R-5} ${R-5} 0 0 1 ${R+R*.68},${R-R*.46}"
      fill="none" stroke="rgba(255,255,255,0.40)" stroke-width="2" stroke-linecap="round"/>
  </svg>`;
}

/* ════════════════════════════════════════════
   GAME STATE
════════════════════════════════════════════ */
let state={
  screen:'intro',racks:makeLevel(1),sel:null,completing:new Set(),
  level:1,score:0,moves:0,deals:3,sorted:0,isMuted:false
};
let toastTmr=null;

function render(){
  const app=document.getElementById('root');
  if(state.screen==='intro'){app.innerHTML=renderIntro();bindIntro();}
  else if(state.screen==='levelBanner'){app.innerHTML=renderBanner();bindBanner();}
  else if(state.screen==='game'){app.innerHTML=renderGame();bindGame();}
  else if(state.screen==='win'){app.innerHTML=renderWin();bindWin();}
}

/* ════════════════════════════════════════════
   INTRO SCREEN
════════════════════════════════════════════ */
function renderIntro(){
  const stars=Array.from({length:22}).map(()=>`<div style="position:absolute;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;border-radius:50%;background:rgba(200,218,255,0.22);left:${Math.random()*100}%;top:${Math.random()*100}%;animation:starPulse ${3+Math.random()*5}s ease-in-out ${Math.random()*5}s infinite"></div>`).join('');
  const coins=[{d:1,x:-105,y:-20,rot:-20,sz:52},{d:3,x:-46,y:-92,rot:12,sz:66},{d:5,x:50,y:-92,rot:-7,sz:66},{d:7,x:108,y:-20,rot:18,sz:52},{d:4,x:0,y:84,rot:-10,sz:58}];
  const coinHtml=coins.map((c,i)=>`<div style="position:absolute;top:50%;left:50%;transform:translate(calc(-50% + ${c.x}px),calc(-50% + ${c.y}px)) rotate(${c.rot}deg);animation:coinIn 0.6s cubic-bezier(0.34,1.56,0.64,1) ${i*120}ms both,floatBobC ${3+i*.4}s ease-in-out ${600+i*120}ms infinite">${makeCoinSVG(c.d,c.sz,true)}</div>`).join('');
  return `<div style="min-height:100vh;background:radial-gradient(ellipse at 50% 42%,#1e3050 0%,#060d1a 65%);display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;position:relative;overflow:hidden;padding:20px">
    ${stars}
    <div style="position:relative;width:260px;height:260px;display:flex;align-items:center;justify-content:center;margin-bottom:20px;flex-shrink:0">
      <div style="position:absolute;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(255,200,0,0.18) 0%,transparent 72%);animation:floatBobC 2.4s ease-in-out infinite"></div>
      ${coinHtml}
      <div style="position:relative;z-index:10;animation:coinIn 0.8s cubic-bezier(0.34,1.56,0.64,1) 260ms both,floatBobC 3.5s ease-in-out 960ms infinite">${makeCoinSVG(3,84,true)}</div>
    </div>
    <div id="introText" style="text-align:center;opacity:0;transform:translateY(22px);transition:all 0.7s ease 0.4s">
      <div style="font-size:11px;letter-spacing:8px;font-weight:800;color:rgba(255,200,100,0.65);margin-bottom:6px">PUZZLE GAME</div>
      <div style="font-size:clamp(36px,10vw,54px);font-weight:900;letter-spacing:4px;line-height:1;background:linear-gradient(180deg,#ffe080 0%,#f0a000 48%,#c06000 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px">COIN SORT</div>
      <div style="font-size:13px;color:rgba(160,192,255,0.65);letter-spacing:3px;font-weight:700;margin-bottom:28px">STACK · MATCH · CONQUER</div>
      <div style="display:flex;gap:12px;justify-content:center;margin-bottom:30px">
        ${[{e:'👆',t:'Tap to pick'},{e:'🎯',t:'Move to sort'},{e:'✨',t:'Match 4 to clear'}].map(t=>`<div style="text-align:center;padding:10px 12px;background:rgba(255,255,255,0.055);border-radius:14px;border:1px solid rgba(255,255,255,0.10)"><div style="font-size:20px;margin-bottom:4px">${t.e}</div><div style="font-size:10px;color:rgba(160,192,255,0.65);font-weight:700">${t.t}</div></div>`).join('')}
      </div>
      <button id="playBtn" style="padding:16px 52px;background:linear-gradient(135deg,#f0a000,#ffe040 44%,#f0a000);border:none;border-radius:22px;font-size:22px;font-weight:900;color:#1a0800;cursor:pointer;letter-spacing:2px;font-family:Nunito,sans-serif;box-shadow:0 8px 30px rgba(255,160,0,.52),0 0 0 3px rgba(255,200,0,.32);animation:pulseBg 2.2s ease-in-out infinite">▶ PLAY NOW</button>
      <div style="margin-top:12px;font-size:11px;color:rgba(255,255,255,0.28);font-weight:700">🎵 music starts on tap</div>
    </div>
  </div>`;
}
function bindIntro(){
  setTimeout(()=>{const el=document.getElementById('introText');if(el){el.style.opacity='1';el.style.transform='translateY(0)';}},50);
  document.getElementById('playBtn').onclick=()=>{
    startBg(); state.screen='levelBanner'; render();
  };
}

/* ════════════════════════════════════════════
   LEVEL BANNER
════════════════════════════════════════════ */
function renderBanner(){
  const lvl=state.level,name=LN[lvl-1],icon=LI[lvl-1],color=LC[lvl-1];
  const nc=Math.min(lvl+1,8);
  const dots=Array.from({length:MAX_LVL}).map((_,i)=>`<div style="width:34px;height:34px;border-radius:50%;background:${i<lvl?color:'rgba(255,255,255,0.10)'};border:2.5px solid ${i<lvl?color:'rgba(255,255,255,0.18)'};display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:${i<lvl?`0 0 14px ${color}`:'none'}">${i<lvl?LI[i]:''}</div>`).join('');
  const coins=Array.from({length:nc},(_,i)=>i+1).map((d,i)=>`<div style="margin:4px;animation:coinIn 0.5s cubic-bezier(0.34,1.56,0.64,1) ${d*80}ms both">${makeCoinSVG(d,32,true)}</div>`).join('');
  return `<div style="min-height:100vh;background:radial-gradient(ellipse at 50% 50%,${color}28 0%,rgba(0,6,20,0.96) 68%);display:flex;align-items:center;justify-content:center;user-select:none;cursor:pointer" id="bannerScreen">
    <div style="text-align:center;animation:lvlIn 0.65s cubic-bezier(0.34,1.56,0.64,1);padding:20px 24px;max-width:380px">
      <div style="font-size:82px;line-height:1;margin-bottom:10px">${icon}</div>
      <div style="font-size:13px;font-weight:900;color:${color};letter-spacing:5px;text-transform:uppercase;margin-bottom:5px">LEVEL ${lvl} / ${MAX_LVL}</div>
      <div style="font-size:clamp(32px,10vw,46px);font-weight:900;color:#fff;letter-spacing:3px;margin-bottom:6px;text-shadow:0 0 36px ${color},0 0 70px ${color}66">${name}</div>
      <div style="font-size:14px;color:rgba(200,218,240,0.75);font-weight:700;margin-bottom:22px">Sort <span style="color:${color}">${nc} coin types</span> · 4 matching = rack clears</div>
      <div style="display:flex;gap:9px;justify-content:center;margin-bottom:20px">${dots}</div>
      <div style="display:flex;flex-wrap:wrap;justify-content:center;margin-bottom:20px;max-width:300px;margin:0 auto 20px">${coins}</div>
      <div style="font-size:12px;color:rgba(255,255,255,0.35);font-weight:700;letter-spacing:1px">tap anywhere to start</div>
    </div>
  </div>`;
}
function bindBanner(){
  const t=setTimeout(()=>{state.screen='game';render();},3400);
  document.getElementById('bannerScreen').onclick=()=>{clearTimeout(t);state.screen='game';render();};
}

/* ════════════════════════════════════════════
   GAME SCREEN
════════════════════════════════════════════ */
function renderGame(){
  const {racks,sel,completing,level,score,moves,deals,sorted,isMuted}=state;
  const nc=Math.min(level+1,8);
  const lvlColor=LC[level-1];
  const xpPct=((level-1)/(MAX_LVL-1))*100;
  const floatCoin=(sel!==null&&Array.isArray(racks[sel])&&racks[sel].length>0)?racks[sel][racks[sel].length-1]:null;
  const validDrop=new Set();
  if(floatCoin!==null) racks.forEach((r,i)=>{if(i!==sel&&canDrop(r,floatCoin))validDrop.add(i);});

  function rackHtml(rack,idx){
    const locked=rack===null,isSel=sel===idx;
    const isComp=completing.has(idx),isValid=validDrop.has(idx);
    const display=locked?[]:(isSel?rack.slice(0,-1):rack);
    const topCoin=(!locked&&rack.length>0)?rack[rack.length-1]:null;
    const showFloat=isSel&&topCoin!==null;
    const bg=locked?"linear-gradient(175deg,#b0c0cc,#94a6b4)":isComp?"linear-gradient(175deg,#c4ffaa,#8eec66)":isSel?"linear-gradient(175deg,#cce6ff,#9ed0fc)":isValid?"linear-gradient(175deg,#c4ffc8,#84ee88)":"linear-gradient(175deg,#c6d4e2,#a4b8ca)";
    const border=isComp?"2.5px solid #2ec408":isSel?"2.5px solid #2c7ee8":isValid?"2.5px solid #24b424":locked?"2px solid rgba(160,178,192,0.68)":"2px solid rgba(255,255,255,0.76)";
    const shadow=isComp?"0 0 28px rgba(50,210,8,.55),0 0 55px rgba(50,210,8,.22),inset 0 5px 16px rgba(0,0,0,.14)":isSel?"0 0 0 4px rgba(44,126,232,.28),inset 0 5px 18px rgba(0,0,0,.22),0 8px 24px rgba(0,0,0,.28)":isValid?"0 0 0 3.5px rgba(36,180,36,.28),inset 0 5px 18px rgba(0,0,0,.18)":"inset 0 6px 22px rgba(0,0,0,.26),inset 3px 0 8px rgba(0,0,0,.09),inset -3px 0 8px rgba(0,0,0,.09),0 3px 12px rgba(0,0,0,.19),inset 0 1px 0 rgba(255,255,255,.74)";
    const tf=isComp?"scale(1.07) translateY(-4px)":isSel?"scale(1.04) translateY(-4px)":"scale(1)";
    const coinStack=display.length>0?`<div style="display:flex;flex-direction:column-reverse;align-items:center;gap:3px;position:relative;z-index:2">${display.map((d,ci)=>`<div style="animation:${ci===display.length-1?'coinIn 0.3s ease':'none'}">${makeCoinSVG(d,42,isComp)}</div>`).join('')}</div>`:'';
    const floatEl=showFloat?`<div style="position:absolute;top:-68px;left:50%;z-index:300;animation:floatBob 0.9s ease-in-out infinite">${makeCoinSVG(topCoin,64,true)}</div>`:'';
    const badge=isComp?`<div style="position:absolute;top:9px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:900;color:#145a00;white-space:nowrap;background:rgba(200,255,160,.55);border-radius:8px;padding:1px 6px;border:1px solid rgba(40,180,8,.4);z-index:5">✓ SORTED!</div>`:'';
    const arrow=isValid&&!isSel?`<div style="position:absolute;bottom:8px;left:50%;font-size:15px;opacity:.85;z-index:5;animation:arrowBounce 0.65s ease-in-out infinite">↓</div>`:'';
    return `<div data-rack="${idx}" style="width:54px;height:200px;border-radius:16px;background:${bg};border:${border};box-shadow:${shadow};display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding-bottom:9px;position:relative;overflow:visible;cursor:${locked?'default':'pointer'};transition:border-color .18s,box-shadow .24s,transform .18s;transform:${tf};flex-shrink:0">
      <div style="position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,0.82);border-radius:16px 16px 0 0;pointer-events:none"></div>
      <div style="position:absolute;top:0;left:0;right:0;height:20px;background:rgba(0,0,0,.10);border-radius:16px 16px 0 0;pointer-events:none"></div>
      <div style="position:absolute;left:50%;transform:translateX(-50%);width:52px;top:14px;bottom:0;background:rgba(0,0,0,.07);border-radius:0 0 9px 9px;box-shadow:inset 0 4px 14px rgba(0,0,0,.18);pointer-events:none"></div>
      <div style="position:absolute;left:0;top:0;bottom:0;width:9px;background:linear-gradient(to right,rgba(0,0,0,.09),transparent);pointer-events:none"></div>
      <div style="position:absolute;right:0;top:0;bottom:0;width:9px;background:linear-gradient(to left,rgba(0,0,0,.09),transparent);pointer-events:none"></div>
      ${locked?`<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);font-size:26px;filter:drop-shadow(0 2px 3px rgba(0,0,0,.30));z-index:2">🔒</div>`:''}
      ${coinStack}
      ${!locked&&display.length===0&&!showFloat?`<div style="font-size:24px;margin-bottom:14px;opacity:.11">○</div>`:''}
      ${floatEl}${badge}${arrow}
    </div>`;
  }

  const row1=racks.slice(0,5),row2=racks.slice(5,10);
  const chipHtml=Array.from({length:nc},(_,i)=>i+1).map(d=>`<div style="display:flex;align-items:center;gap:3px;background:rgba(0,0,0,.14);border-radius:12px;padding:1.5px 7px 1.5px 3px;border:1.5px solid ${P[d].e};flex-shrink:0"><div style="width:18px;height:7px;border-radius:4px;background:${P[d].a}"></div><span style="font-size:9px;font-weight:800;color:${P[d].b}">${P[d].n}</span></div>`).join('');
  const pipHtml=Array.from({length:nc}).map((_,i)=>`<div style="width:9px;height:9px;border-radius:50%;background:${i<sorted?'#38cc10':'rgba(0,0,0,.18)'};border:1.5px solid ${i<sorted?'#28aa08':'#7090a0'};box-shadow:${i<sorted?'0 0 6px rgba(56,200,16,.75)':'none'};transition:all .3s"></div>`).join('');
  const dealPipHtml=Array.from({length:6}).map((_,i)=>`<div style="width:13px;height:13px;border-radius:50%;background:${i<deals?'#ffc820':'rgba(0,0,0,.18)'};border:1.5px solid ${i<deals?'#e09800':'#7890a0'};box-shadow:${i<deals?'0 0 7px rgba(255,200,0,.70)':'none'};transition:all .28s"></div>`).join('');

  return `<div id="gameScreen" style="min-height:100vh;background:linear-gradient(178deg,#b8c6d4 0%,#a4b4c2 55%,#90a4b4 100%);display:flex;flex-direction:column;align-items:center;padding-bottom:24px;user-select:none">
    <!-- HEADER -->
    <div style="width:100%;max-width:400px;padding:18px 14px 6px;display:flex;align-items:center;gap:10px">
      <div style="width:58px;height:58px;background:rgba(0,0,0,.14);border-radius:50%;border:2px solid rgba(255,255,255,.45);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;box-shadow:inset 0 2px 6px rgba(0,0,0,.2)">
        <span style="font-size:22px;font-weight:900;color:${lvlColor};line-height:1">${level}</span>
        <span style="font-size:12px;line-height:1">${LI[level-1]}</span>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:10px;color:${lvlColor};font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px">${LI[level-1]} ${LN[level-1]} · ${sorted}/${nc} sorted</div>
        <div style="height:26px;border-radius:13px;background:rgba(0,0,0,.18);border:2.5px solid rgba(255,255,255,.70);overflow:hidden;box-shadow:inset 0 3px 9px rgba(0,0,0,.24);position:relative">
          <div style="position:absolute;inset:0;width:${Math.max(xpPct,2)}%;background:linear-gradient(90deg,${lvlColor},${lvlColor}bb 50%,${lvlColor});background-size:200% 100%;animation:shimmer 2.5s linear infinite;border-radius:11px;box-shadow:inset 0 2px 0 rgba(255,255,255,.40),0 0 12px ${lvlColor}88;transition:width .9s ease"></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <button id="muteBtn" style="background:rgba(0,0,0,.18);border:1.5px solid rgba(255,255,255,.32);border-radius:8px;padding:3px 8px;font-size:14px;cursor:pointer;color:#fff">${isMuted?'🔇':'🔊'}</button>
        <div style="background:rgba(0,0,0,.18);border-radius:9px;padding:3px 9px;text-align:center;border:1px solid rgba(255,255,255,.35)">
          <div style="font-size:8px;color:#668090;font-weight:800;letter-spacing:1px">SCORE</div>
          <div style="font-size:16px;font-weight:900;color:#344858">${score}</div>
        </div>
      </div>
    </div>
    <!-- SUB-STATS -->
    <div style="width:100%;max-width:400px;padding:0 14px 4px;display:flex;align-items:center;gap:8px">
      <span style="font-size:10px;color:#506070;font-weight:700;flex-shrink:0">Moves: <b>${moves}</b></span>
      <div style="display:flex;gap:3px;flex-wrap:wrap;flex:1;overflow:hidden">${chipHtml}</div>
      <div style="display:flex;gap:3px;flex-shrink:0">${pipHtml}</div>
    </div>
    <!-- TOAST AREA -->
    <div id="toastArea" style="height:30px;width:100%;display:flex;align-items:center;justify-content:center;z-index:10"></div>
    <!-- RACK GRID -->
    <div style="width:100%;max-width:400px;padding:0 8px">
      <div style="background:rgba(0,0,0,.10);border-radius:22px;padding:12px 4px 16px;box-shadow:inset 0 5px 18px rgba(0,0,0,.24),0 2px 12px rgba(0,0,0,.15)">
        <div style="display:flex;gap:4px;justify-content:center;padding-bottom:8px;border-bottom:1px solid rgba(255,255,255,.13)">
          ${row1.map((r,ci)=>rackHtml(r,ci)).join('')}
        </div>
        <div style="display:flex;gap:4px;justify-content:center;margin-top:8px">
          ${row2.map((r,ci)=>rackHtml(r,5+ci)).join('')}
        </div>
      </div>
    </div>
    <!-- DEAL PIPS -->
    <div style="display:flex;gap:5px;align-items:center;margin-top:9px">
      <span style="font-size:11px;color:#688090;font-weight:700">Deals:</span>
      ${dealPipHtml}
    </div>
    <!-- DEAL BUTTON -->
    <div style="width:100%;max-width:400px;padding:9px 18px 0;display:flex;gap:8px;align-items:center">
      <button id="dealBtn" style="flex:1;padding:14px 0;background:${deals>0?'linear-gradient(160deg,#3c3830,#242018)':'linear-gradient(160deg,#505050,#3a3a3a)'};border:2px solid rgba(255,255,255,.08);border-radius:20px;display:flex;align-items:center;justify-content:center;gap:14px;cursor:${deals>0?'pointer':'not-allowed'};box-shadow:${deals>0?'0 7px 24px rgba(0,0,0,.44),inset 0 1px 0 rgba(255,255,255,.12)':'none'};font-family:Nunito,sans-serif;animation:${deals>0?'floatBobC 2.5s ease-in-out infinite':'none'}">
        <div style="position:relative;width:46px;height:28px;flex-shrink:0">
          ${[{l:0,t:9},{l:10,t:3},{l:20,t:9}].map(p=>`<div style="position:absolute;left:${p.l}px;top:${p.t}px;width:27px;height:11px;border-radius:50%;background:radial-gradient(ellipse at 33% 28%,#ffe870,#f0a800,#c07800);border:1.5px solid rgba(0,0,0,.30);box-shadow:0 2px 7px rgba(0,0,0,.45),inset 0 1.5px 3px rgba(255,255,255,.44)"></div>`).join('')}
        </div>
        <span style="font-size:28px;font-weight:900;font-style:italic;color:${deals>0?'#44d038':'#606060'};text-shadow:${deals>0?'0 0 20px rgba(68,208,56,.85),0 2px 4px rgba(0,0,0,.5)':'none'}">Deal!</span>
        ${deals>0?`<div style="font-size:12px;color:#88ee80;font-weight:800;background:rgba(68,208,52,.14);border:1px solid rgba(68,208,52,.36);border-radius:9px;padding:2px 9px">×${deals}</div>`:''}
      </button>
      <button id="helpBtn" style="width:42px;height:42px;border-radius:21px;background:rgba(0,0,0,.22);border:1.5px solid rgba(255,255,255,.35);font-size:18px;font-weight:900;color:rgba(255,255,255,.75);cursor:pointer">?</button>
    </div>
    <!-- HINT -->
    <div style="margin-top:10px;max-width:360px;width:90%;padding:9px 14px;background:rgba(0,0,0,.10);border-radius:13px;font-size:11px;color:#4e6070;line-height:1.8;font-weight:700;text-align:center;border:1px solid rgba(255,255,255,.22)">
      Tap a rack to lift the top coin → tap target to drop it.<br>
      <span style="color:#886600">4 matching coins = rack clears with confetti! 🎊</span>
    </div>
    <!-- DEAL MODAL -->
    <div id="dealModal" style="display:none;position:fixed;inset:0;z-index:900;background:rgba(0,6,20,.82);align-items:center;justify-content:center;backdrop-filter:blur(10px)">
      <div style="background:#192838;border-radius:24px;padding:26px;width:min(320px,90vw);border:1.5px solid rgba(255,255,255,.12);animation:lvlIn .36s cubic-bezier(0.34,1.56,0.64,1)">
        <div style="font-size:42px;text-align:center;margin-bottom:6px">🪙</div>
        <div style="font-size:22px;font-weight:900;color:#44d038;text-align:center;letter-spacing:.5px;margin-bottom:2px">Deal Button</div>
        <div style="font-size:12px;color:rgba(160,190,220,.6);font-weight:700;text-align:center;margin-bottom:16px">Your secret weapon 🔑</div>
        ${[['🔓','Unlocks a Rack','Adds one empty buffer slot when you\'re stuck.'],['💰','Costs 1 Token','You start each level with 3 deals. Use wisely!'],['🎁','Earn Free Deals','Every 2 sorted racks gives you a bonus deal token.'],['🧠','Use Strategically','Best when no moves remain. Early use wastes buffer space.']].map(([i,t,d])=>`<div style="display:flex;gap:12px;margin-bottom:12px;align-items:flex-start"><span style="font-size:20px;line-height:1.4;flex-shrink:0">${i}</span><div><div style="font-size:13px;font-weight:900;color:#b8d8f0;margin-bottom:2px">${t}</div><div style="font-size:11px;color:#607888;font-weight:700;line-height:1.55">${d}</div></div></div>`).join('')}
        <button id="closeModal" style="width:100%;margin-top:6px;padding:12px 0;background:#1060d0;border:1.5px solid rgba(100,180,255,.38);border-radius:14px;font-size:16px;font-weight:900;color:#fff;cursor:pointer;font-family:Nunito,sans-serif">Got it! ✓</button>
      </div>
    </div>
  </div>`;
}

function showToast(msg,color){
  const ta=document.getElementById('toastArea');if(!ta)return;
  ta.innerHTML=`<div style="background:rgba(6,12,24,.88);color:${color};padding:5px 20px;border-radius:20px;font-size:13px;font-weight:800;box-shadow:0 4px 16px rgba(0,0,0,.35);border:1.5px solid ${color}55;animation:toastIn .25s ease">${msg}</div>`;
  clearTimeout(toastTmr);
  toastTmr=setTimeout(()=>{const ta=document.getElementById('toastArea');if(ta)ta.innerHTML='';},2200);
}
function spawnFloatPts(el,pts,color){
  const r=el.getBoundingClientRect();
  const d=document.createElement('div');
  d.style.cssText=`position:fixed;left:${r.left+r.width/2}px;top:${r.top+r.height*.38}px;font-size:24px;font-weight:900;color:${color};text-shadow:0 0 14px ${color},0 2px 5px rgba(0,0,0,.65);pointer-events:none;z-index:650;animation:floatUp 1.1s ease-out forwards;font-family:Nunito,sans-serif;white-space:nowrap;transform:translateX(-50%)`;
  d.textContent='+'+pts;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),1150);
}

function bindGame(){
  document.getElementById('muteBtn').onclick=()=>{state.isMuted=!state.isMuted;muted=state.isMuted;render();};
  document.getElementById('dealBtn').onclick=dealAction;
  document.getElementById('helpBtn').onclick=()=>{document.getElementById('dealModal').style.display='flex';};
  document.getElementById('closeModal').onclick=()=>{document.getElementById('dealModal').style.display='none';};
  document.querySelectorAll('[data-rack]').forEach(el=>{
    el.addEventListener('click',()=>tapRack(parseInt(el.dataset.rack)));
  });
}

function tapRack(idx){
  const {racks,sel,completing}=state;
  const rack=racks[idx];
  if(rack===null||completing.has(idx)) return;
  if(sel===null){if(rack.length>0){sfxPick();state.sel=idx;render();} return;}
  if(sel===idx){state.sel=null;render();return;}
  const floatCoin=racks[sel][racks[sel].length-1];
  if(!canDrop(rack,floatCoin)){
    sfxBad();
    const msg=rack.length>=CAP?'🚫 Rack is full!':`${P[rack[rack.length-1]].n} ≠ ${P[floatCoin].n}`;
    // Shake
    const el=document.querySelector(`[data-rack="${idx}"]`);
    if(el){el.style.animation='rShake .38s ease';setTimeout(()=>{if(el)el.style.animation='';},400);}
    state.sel=null;
    showToast(msg,'#ff7070');render();return;
  }
  const nr=racks.map(x=>Array.isArray(x)?[...x]:x);
  nr[idx]=[...nr[idx],nr[sel].pop()];
  state.moves++;sfxDrop();
  state.racks=nr;state.sel=null;

  if(rackDone(nr[idx])){
    const d=nr[idx][0],pts=d*60+50;
    state.score+=pts;sfxSort();
    const rEl=document.querySelector(`[data-rack="${idx}"]`);
    if(rEl){const r=rEl.getBoundingClientRect();launchConfetti(r.left+r.width/2,r.top+r.height/2,110);spawnFloatPts(rEl,pts,P[d].g);}
    showToast(`🏆 ${P[d].n} sorted! +${pts}`,P[d].g);
    state.completing=new Set([...state.completing,idx]);
    state.sorted++;
    if(state.sorted%2===0) state.deals=Math.min(state.deals+1,6);
    render();
    setTimeout(()=>{
      state.racks=state.racks.map((q,i)=>i===idx?[]:q);
      state.completing=new Set([...state.completing].filter(x=>x!==idx));
      const nc=Math.min(state.level+1,8);
      if(state.sorted>=nc){
        setTimeout(()=>{
          if(state.level>=MAX_LVL){sfxLevel();fullConfetti();setTimeout(()=>{state.screen='win';render();},900);return;}
          const nl=state.level+1;sfxLevel();fullConfetti();
          state.level=nl;state.racks=makeLevel(nl);state.sel=null;
          state.completing=new Set();state.sorted=0;state.deals=Math.min(state.deals+2,6);
          state.screen='levelBanner';render();
        },700);
      } else render();
    },1500);
  } else render();
}

function dealAction(){
  const {deals,racks}=state;
  if(deals<=0){showToast('No deals! Keep sorting.','#ff8080');return;}
  const li=racks.findIndex(r=>r===null);
  if(li===-1){showToast('All racks already open!','#ffcc60');return;}
  state.racks=[...racks];state.racks[li]=[];
  state.deals--;sfxDeal();
  launchConfetti(innerWidth/2,100,52);
  showToast('🔓 Rack unlocked!','#ffe566');
  render();
}

/* ════════════════════════════════════════════
   WIN SCREEN
════════════════════════════════════════════ */
function renderWin(){
  return `<div style="min-height:100vh;background:rgba(0,6,18,.92);display:flex;align-items:center;justify-content:center;user-select:none">
    <div style="background:linear-gradient(148deg,#fffde0,#ffe870 55%,#ffc820);border-radius:30px;padding:42px 34px;text-align:center;max-width:310px;width:90%;animation:winPop .55s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 24px 70px rgba(0,0,0,.55),0 0 0 5px rgba(255,200,0,.5)">
      <div style="font-size:72px;line-height:1;margin-bottom:8px;animation:floatBobC 1.3s ease-in-out infinite">🏆</div>
      <div style="font-size:32px;font-weight:900;color:#2a1000;letter-spacing:1px;margin-bottom:4px">YOU WIN!</div>
      <div style="font-size:14px;color:#6a3400;font-weight:700;line-height:1.7;margin-bottom:14px">All ${MAX_LVL} levels mastered!</div>
      <div style="font-size:44px;font-weight:900;color:#b85000">${state.score}</div>
      <div style="font-size:11px;color:#8a5020;font-weight:800;letter-spacing:2px;margin-bottom:4px">FINAL SCORE</div>
      <div style="font-size:13px;color:#8a6040;font-weight:700;margin-bottom:24px">${state.moves} moves total</div>
      <button id="replayBtn" style="background:linear-gradient(135deg,#ff9800,#e55100);border:none;border-radius:16px;padding:14px 36px;font-size:20px;font-weight:900;color:#fff;cursor:pointer;box-shadow:0 6px 20px rgba(220,80,0,.55);font-family:Nunito,sans-serif">Play Again 🎮</button>
    </div>
  </div>`;
}
function bindWin(){
  document.getElementById('replayBtn').onclick=()=>{
    state={screen:'intro',racks:makeLevel(1),sel:null,completing:new Set(),level:1,score:0,moves:0,deals:3,sorted:0,isMuted:false};
    muted=false;render();
  };
}

/* ════════════════════════════════════════════
   BOOT
════════════════════════════════════════════ */
initConfetti();
render();
</script>
